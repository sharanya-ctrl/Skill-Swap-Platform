<!DOCTYPE html>
<html lang="en">

<head>
<title>Browse Skills</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<h2>SkillSwap</h2>

<div class="nav-links">
<a href="#">Dashboard</a>

<h1>Browse Skills</h1>

<input type="text" id="search" placeholder="Search skills..." onkeyup="searchSkills()">

<h2>Add User</h2>

<input type="text" id="name" placeholder="Enter name">
<input type="text" id="teach" placeholder="Skill you teach">
<input type="text" id="want" placeholder="Skill you want">

<button onclick="addUser()">Add User</button>

<div id="users">

<div class="card">
<h3>Rahul</h3>
<p>Teaches: Guitar</p>
<p>Wants: Python</p>
<button onclick="requestSwap()">Request Swap</button>
</div>

<div class="card">
<h3>Ananya</h3>
<p>Teaches: UI Design</p>
<p>Wants: Web Development</p>
<button onclick="requestSwap()">Request Swap</button>
</div>

<div class="card">
<h3>Arjun</h3>
<p>Teaches: Photography</p>
<p>Wants: Video Editing</p>
<button onclick="requestSwap()">Request Swap</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
